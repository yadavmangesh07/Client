spring.application.name=billing-backend

# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# MongoDB 
# removed the default value to ensure safety
spring.data.mongodb.uri=${MONGODB_URI}
# ===============================
# Logging
# ===============================
logging.level.root=INFO
logging.level.org.springframework.web=INFO
logging.level.org.mongodb.driver=INFO

# ===============================
# Email Settings 
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true



# mvn clean spring-boot:run


# --- SENTRY ERROR TRACKING ---
# Use the Environment Variable if it exists, otherwise leave empty (for local)
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SENTRY_ENVIRONMENT:development}
sentry.traces-sample-rate=1.0

# ⚠️ Warning: Default PII includes user IPs and Cookies. 
# Keep this true only if you really need to see WHO is hitting the error.
sentry.send-default-pii=true